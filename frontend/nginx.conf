server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (applied to HTML/API responses, NOT to /terminal/)
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header X-Frame-Options           "SAMEORIGIN"               always;
    add_header X-XSS-Protection          "1; mode=block"            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Static assets — long cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health probe
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }

    # Game WebSocket — BEFORE generic /api/ block
    location /api/game/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $backend       http://backend:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # API proxy
    location /api/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $backend       http://backend:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Terminal WebSocket (ttyd)
    # rewrite strips /terminal prefix → ttyd receives /ws (its actual WebSocket path)
    # Must forward Sec-WebSocket-Protocol header for ttyd's 'tty' subprotocol
    location /terminal/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $tools_upstream http://tools:7681;
        rewrite ^/terminal/(.*)$ /$1 break;
        proxy_pass         $tools_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade                 $http_upgrade;
        proxy_set_header   Connection              "upgrade";
        proxy_set_header   Host                    $host;
        proxy_set_header   Sec-WebSocket-Protocol  $http_sec_websocket_protocol;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
}
